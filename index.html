<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#10b981" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SecureAuth" />
    <meta name="application-name" content="SecureAuth" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-192x192.png" />
    
    <!-- Microsoft Tiles -->
    <meta name="msapplication-TileColor" content="#10b981" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />
    
    <!-- Original Meta Tags -->
    <title>Face Recognition & Fingerprint Login Web App</title>
    <meta property="og:image" content="https://bolt.new/static/og_default.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://bolt.new/static/og_default.png" />
    <meta name="description" content="Secure biometric authentication with fingerprint and face login - just like your banking app" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then(registration => {
              console.log('✅ Service Worker registered successfully:', registration.scope);
            })
            .catch(error => {
              console.log('❌ Service Worker registration failed:', error);
            });
        });
      } else {
        console.log('ℹ️ Service Workers not supported in this browser');
      }
      
      // Log when app is installed/added to home screen
      window.addEventListener('appinstalled', (event) => {
        console.log('✅ App was installed successfully');
      });
      
      // Detect if running in standalone mode (PWA)
      if (window.matchMedia('(display-mode: standalone)').matches) {
        console.log('✅ App running in standalone mode (PWA)');
        document.documentElement.classList.add('pwa-mode');
      }
      
      // Handle beforeinstallprompt event (for custom install button)
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        console.log('ℹ️ App can be installed');
        // You can show a custom install button here
        window.dispatchEvent(new CustomEvent('can-install-pwa', { detail: deferredPrompt }));
      });
    </script>
  </body>
</html>
